name: Kubernetes CI
on:
  push:
    branches:
      - main
jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps: 
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: "docker build -t edeoz/test:$GITHUB_SHA ."
      - name: Login Docker
        uses: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKER_GITHUB_USERNAME }}"
          password: "${{ secrets.DOCKER_GITHUB_V1 }}"
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Update deployment.yml with latest docker tag
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          yq -i ".spec.template.spec.containers[0].image = \"eoza/test:${SHORT_SHA}\"" ./k8s/pyapp-deployment.yml
