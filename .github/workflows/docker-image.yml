name: Kubernetes CI
on:
  push:
    branches:
      - main
jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps: 
      - name: Code Checkout
        uses: actions/checkout@v4
      - name: Build Docker Image
        run: "docker build -t edeoz/test:$GITHUB_SHA ."
      - name: Login Docker
        run: docker/login-action@v3
        with:
          username: "${{ secrets.DOCKER_GITHUB_USERNAME }}"
          password: "${{ secrets.DOCKER_GITHUB_V1 }}"
